<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>King Setup</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#050505;
      color:white;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px;
      border-bottom:1px solid #222;
    }

    .logo{
      color:gold;
      font-size:28px;
      font-weight:bold;
    }

    .btn{
      background:gold;
      color:black;
      padding:10px 20px;
      border:none;
      border-radius:8px;
      font-weight:bold;
    }

    .hero{
      text-align:center;
      padding:80px 20px;
    }

    .hero h1{
      font-size:42px;
      color:gold;
      margin-bottom:15px;
    }

    .hero p{
      color:#aaa;
      margin-bottom:30px;
    }

    .search-box{
      display:flex;
      justify-content:center;
      gap:10px;
      margin-bottom:40px;
    }

    .search-box input{
      width:70%;
      max-width:400px;
      padding:15px;
      border:none;
      border-radius:10px;
      background:#111;
      color:white;
    }

    .search-box button{
      padding:15px 20px;
      background:gold;
      border:none;
      border-radius:10px;
      font-weight:bold;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      padding:20px;
    }

    .card{
      background:#111;
      border:1px solid #222;
      border-radius:15px;
      overflow:hidden;
    }

    .card img{
      width:100%;
      height:200px;
      object-fit:cover;
    }

    .card-content{
      padding:15px;
    }

    .card-content h3{
      margin-bottom:10px;
    }

    .price{
      color:gold;
      font-size:22px;
      font-weight:bold;
      margin-bottom:15px;
    }

    .buy-btn{
      width:100%;
      padding:12px;
      border:none;
      background:gold;
      border-radius:8px;
      font-weight:bold;
    }

  </style>
</head>

<body>

  <header>

    <div class="logo">
      King Setup
    </div>

    <button class="btn">
      Login
    </button>

  </header>

  <section class="hero">

    <h1>
      Global Product Search
    </h1>

    <p>
      Search products from multiple marketplaces
    </p>

    <div class="search-box">

      <input type="text" placeholder="Search products...">

      <button onclick="searchProduct()">
        Search
      </button>

    </div>

  </section>

  <section class="products">

    <div class="card">

      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">

      <div class="card-content">

        <h3>Running Shoes</h3>

        <div class="price">
          $99
        </div>

        <button class="buy-btn">
          View Product
        </button>

      </div>

    </div>

    <div class="card">

      <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">

      <div class="card-content">

        <h3>Luxury Watch</h3>

        <div class="price">
          $120
        </div>

        <button class="buy-btn">
          View Product
        </button>

      </div>

    </div>

  </section>

  <script>

    function searchProduct(){

      alert("Search System Coming Soon");

    }

  </script>

</body>

  </html>
