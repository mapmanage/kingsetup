<!DOCTYPE html>
<html>

<head>

  <title>King Setup</title>

  <style>

    body{
      margin:0;
      background:#000;
      color:white;
      font-family:Arial;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px;
      border-bottom:1px solid #222;
    }

    .logo{
      color:gold;
      font-size:28px;
      font-weight:bold;
    }

    .login-btn{
      background:gold;
      border:none;
      padding:10px 20px;
      border-radius:10px;
      font-weight:bold;
    }

    .hero{
      text-align:center;
      padding:50px 20px;
    }

    .hero h1{
      color:gold;
      font-size:40px;
      margin-bottom:10px;
    }

    .hero p{
      color:#aaa;
    }

    .search-box{
      margin-top:30px;
      display:flex;
      justify-content:center;
      gap:10px;
    }

    .search-box input{
      width:65%;
      max-width:350px;
      padding:15px;
      border:none;
      border-radius:10px;
      background:#111;
      color:white;
      font-size:16px;
    }

    .search-box button{
      padding:15px 20px;
      background:gold;
      border:none;
      border-radius:10px;
      font-weight:bold;
    }

    .products{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
      padding:20px;
    }

    .card{
      background:#111;
      border-radius:15px;
      overflow:hidden;
      border:1px solid #222;
    }

    .card img{
      width:100%;
      height:180px;
      object-fit:cover;
    }

    .content{
      padding:15px;
    }

    .price{
      color:gold;
      font-size:22px;
      font-weight:bold;
      margin:10px 0;
    }

    .view-btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:gold;
      font-weight:bold;
    }

  </style>

</head>

<body>

<header>

  <div class="logo">
    King Setup
  </div>

  <button class="login-btn">
    Login
  </button>

</header>

<section class="hero">

  <h1>
    Dynamic Product Search
  </h1>

  <p>
    Search Products Instantly
  </p>

  <div class="search-box">

    <input
      type="text"
      id="searchInput"
      placeholder="Search products..."
    >

    <button onclick="searchProducts()">
      Search
    </button>

  </div>

</section>

<section
  class="products"
  id="productContainer"
>

</section>

<script>

const products = [

{
  title:"Running Shoes",
  price:"$99",
  image:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"
},

{
  title:"Luxury Watch",
  price:"$120",
  image:"https://images.unsplash.com/photo-1523275335684-37898b6baf30"
},

{
  title:"Gaming Laptop",
  price:"$899",
  image:"https://images.unsplash.com/photo-1517336714739-489689fd1ca8"
},

{
  title:"Wireless Headphone",
  price:"$80",
  image:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e"
}

];

function showProducts(items){

let container =
document.getElementById("productContainer");

container.innerHTML = "";

items.forEach(product => {

container.innerHTML += `

<div class="card">

<img src="${product.image}">

<div class="content">

<h3>${product.title}</h3>

<div class="price">
${product.price}
</div>

<button class="view-btn">
View Product
</button>

</div>

</div>

`;

});

}

showProducts(products);

function searchProducts(){

let input =
document.getElementById("searchInput")
.value.toLowerCase();

let filteredProducts =
products.filter(product =>
product.title.toLowerCase().includes(input)
);

showProducts(filteredProducts);

}

</script>

</body>

</html>
