<!DOCTYPE html>
<html>

<head>

  <title>King Setup</title>

  <style>

    body{
      background:black;
      color:white;
      font-family:Arial;
      margin:0;
    }

    header{
      display:flex;
      justify-content:space-between;
      padding:20px;
      border-bottom:1px solid #222;
    }

    .logo{
      color:gold;
      font-size:28px;
      font-weight:bold;
    }

    .login{
      background:gold;
      color:black;
      border:none;
      padding:10px 20px;
      border-radius:10px;
      font-weight:bold;
    }

    .hero{
      text-align:center;
      padding:60px 20px;
    }

    .hero h1{
      color:gold;
      font-size:40px;
    }

    .hero p{
      color:#aaa;
    }

    .search{
      margin-top:30px;
    }

    .search input{
      width:70%;
      padding:15px;
      border:none;
      border-radius:10px;
      background:#111;
      color:white;
    }

    .search button{
      padding:15px;
      background:gold;
      border:none;
      border-radius:10px;
      font-weight:bold;
    }

    .products{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
      padding:20px;
    }

    .card{
      background:#111;
      border-radius:15px;
      overflow:hidden;
      border:1px solid #222;
    }

    .card img{
      width:100%;
      height:180px;
      object-fit:cover;
    }

    .content{
      padding:15px;
    }

    .price{
      color:gold;
      font-size:22px;
      font-weight:bold;
      margin:10px 0;
    }

    .buy{
      width:100%;
      padding:12px;
      background:gold;
      border:none;
      border-radius:10px;
      font-weight:bold;
    }

  </style>

</head>

<body>

  <header>

    <div class="logo">
      King Setup
    </div>

    <button class="login">
      Login
    </button>

  </header>

  <section class="hero">

    <h1>
      Global Product Search
    </h1>

    <p>
      Search products from global marketplaces
    </p>

    <div class="search">

      <input type="text" placeholder="Search products">

      <button>
        Search
      </button>

    </div>

  </section>

  <section class="products">

    <div class="card">

      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">

      <div class="content">

        <h3>Running Shoes</h3>

        <div class="price">
          $99
        </div>

        <button class="buy">
          View Product
        </button>

      </div>

    </div>

    <div class="card">

      <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">

      <div class="content">

        <h3>Luxury Watch</h3>

        <div class="price">
          $120
        </div>

        <button class="buy">
          View Product
        </button>

      </div>

    </div>

  </section>

</body>

</html>
